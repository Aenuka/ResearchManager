<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <!-- Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary Meta Tags -->
  <title>ResearchHub | Collaborative Research & Discussion Platform</title>
  <meta
    name="title"
    content="ResearchHub | Collaborative Research & Discussion Platform"
  />
  <meta
    name="description"
    content="A collaborative platform for research teams to upload PDFs, share images, brainstorm ideas, discuss topics, chat in real-time, and exchange voice messages."
  />
  <meta
    name="keywords"
    content="research collaboration, research papers, PDF sharing, academic discussion, brainstorming, team workspace, voice messaging, research management, collaborative research"
  />
  <meta name="author" content="ResearchHub Team" />
  <meta name="robots" content="index, follow" />

  <!-- Theme Color -->
  <meta name="theme-color" content="#2563eb" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta
    property="og:title"
    content="ResearchHub | Collaborative Research & Discussion Platform"
  />
  <meta
    property="og:description"
    content="Upload research papers, share images, brainstorm ideas, chat with team members, and exchange voice messages in one collaborative workspace."
  />
  <meta property="og:image" content="/og-image.png" />
  <meta property="og:url" content="https://your-domain.com" />
  <meta property="og:site_name" content="ResearchHub" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta
    name="twitter:title"
    content="ResearchHub | Collaborative Research & Discussion Platform"
  />
  <meta
    name="twitter:description"
    content="Collaborate on research papers, brainstorm ideas, share files, chat, and send voice messages with your team."
  />
  <meta name="twitter:image" content="/og-image.png" />

  <!-- PWA -->
  <meta name="application-name" content="ResearchHub" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="ResearchHub" />

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
